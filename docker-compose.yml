version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: sentinelcloud-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - sentinel-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: sentinelcloud-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/sentinelcloud
      - JWT_SECRET=supersecretjwtkeyplaceholder
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb
    networks:
      - sentinel-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: sentinelcloud-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - sentinel-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  sentinel-network:
    driver: bridge
